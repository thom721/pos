<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="POS Connect — La solution POS pour les businesses haïtiens.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="POS Connect">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

  <title>POS Connect</title>
  <link rel="manifest" href="manifest.json">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: #1B2A3B;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Loading overlay ────────────────────────────────── */
    #pos-loading {
      position: fixed;
      inset: 0;
      background: #1B2A3B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }
    #pos-loading.out {
      opacity: 0;
      pointer-events: none;
    }
    .pos-logo-wrap {
      width: 72px; height: 72px;
      background: #0077C5;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,119,197,0.4);
    }
    .pos-logo-wrap svg { width: 40px; height: 40px; fill: #fff; }
    .pos-app-name {
      color: #fff; font-size: 22px; font-weight: 700;
      letter-spacing: -0.3px; margin-bottom: 8px;
    }
    .pos-tagline { color: #5A7A9A; font-size: 13px; margin-bottom: 36px; }
    .pos-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #0077C5;
      border-radius: 50%;
      animation: pos-spin 0.75s linear infinite;
    }
    @keyframes pos-spin { to { transform: rotate(360deg); } }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var el = document.getElementById('pos-loading');
      if (el) {
        el.classList.add('out');
        setTimeout(function() { el.remove(); }, 380);
      }
      document.body.style.background = 'transparent';
    }
  </script>
</head>

<body>
  <!-- Retiré automatiquement par removeSplashFromWeb() quand Flutter est prêt -->
  <div id="pos-loading" aria-hidden="true">
    <div class="pos-logo-wrap">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rg" cx="38%" cy="32%" r="62%">
            <stop offset="0%" stop-color="#ff5555"/>
            <stop offset="55%" stop-color="#cc0000"/>
            <stop offset="100%" stop-color="#8b0000"/>
          </radialGradient>
        </defs>
        <circle cx="24" cy="24" r="24" fill="url(#rg)"/>
        <ellipse cx="18" cy="15" rx="7" ry="4.5" fill="#fff" opacity="0.28"/>
        <polygon points="14,12 34,24 14,36" fill="#fff" opacity="0.95"/>
      </svg>
    </div>
    <div class="pos-app-name">POS Connect</div>
    <div class="pos-tagline">Chargement…</div>
    <div class="pos-spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async=""></script>
</body></html>
