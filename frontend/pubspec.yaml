name: pos_connect
description: POS Connect — Système de caisse moderne inspiré de QuickBooks.
publish_to: 'none'
version: 2.0.0+5

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # WebSocket (push temps-réel Android)
  web_socket_channel: ^3.0.1

  # Secure storage (tokens JWT)
  flutter_secure_storage: ^9.2.2

  # Key-value storage (more reliable on Flutter Web)
  shared_preferences: ^2.3.3

  # Fonts
  google_fonts: ^6.2.1

  # Internationalisation / formatage
  intl: ^0.20.2

  # Charts pour le dashboard
  fl_chart: ^0.69.0

  # UUID
  uuid: ^4.5.1

  # File picker (image upload, works on Flutter Web)
  file_picker: ^8.1.3

  # Auto-startup on Windows/macOS/Linux (kiosk mode)
  launch_at_startup: ^0.5.1

  # Cached network image
  cached_network_image: ^3.3.1

  # URL launcher (open Stripe checkout in browser)
  url_launcher: ^6.3.1

  # PDF generation & printing
  pdf: ^3.11.0
  printing: ^5.13.2

  # Cryptography — Ed25519 server identity verification
  cryptography: ^2.7.0

  # Imprimante thermique intégrée Sunmi (H10, V2 Pro, etc.)
  # Fallback automatique vers le package printing sur les autres appareils.
  sunmi_printer_plus: ^4.1.1

  # Impression Bluetooth thermique (ESC/POS) — imprimantes portables 58/80mm
  print_bluetooth_thermal: ^1.2.2

  # Traitement d'image (conversion bitmap pour imprimantes thermiques ESC/POS)
  image: ^4.5.0

  # Cache offline SQLite — produits, clients, catégories disponibles sans réseau
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4  # requis pour Windows / macOS / Linux
  path: ^1.9.1

  # Splash natif — preserve/remove API utilisée au runtime
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/launcher_icon_fg.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/launcher_icon.png"
    favicon_path: "assets/icon/launcher_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/launcher_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/launcher_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_logo.png
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

msix_config:
  display_name: POS Connect
  publisher_display_name: POS Connect
  identity_name: com.kikipllc.posconnect
  publisher: CN=POS Connect
  msix_version: 1.0.0.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: 'internetClient,privateNetworkClientServer'
  languages: fr-FR,en-US
  store: false
  sign_msix: false
