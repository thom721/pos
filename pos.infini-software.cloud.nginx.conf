# /etc/nginx/sites-available/pos.infini-software.cloud
# Activer : ln -s /etc/nginx/sites-available/pos.infini-software.cloud /etc/nginx/sites-enabled/

# ── Redirige HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name pos.infini-software.cloud;

    # Nécessaire pendant la validation certbot (--webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pos.infini-software.cloud;

    # ── Certificats Let's Encrypt ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pos.infini-software.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.infini-software.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Sécurité ───────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;

    client_max_body_size 20M;

    # ── WebSocket temps-réel ───────────────────────────────────────────────
    location /ws {
        proxy_pass          http://127.0.0.1:9003/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── API FastAPI ────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:9003;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffering     off;
    }
}
