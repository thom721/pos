name: Build POS Connect

# Déclencher manuellement OU automatiquement sur chaque tag "v*"
# Exemple : git tag v1.0.0 && git push origin v1.0.0
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.0)'
        required: true
        default: '1.0.0'
      web_server_scheme:
        description: 'Schéma API pour le web (http | https)'
        required: false
        default: 'https'
      web_server_ip:
        description: 'Domaine ou IP de l''API pour le web'
        required: false
        default: 'post.institutionlemignon.com'
      web_server_port:
        description: 'Port API pour le web (443 pour https)'
        required: false
        default: '443'
      web_cloud_url:
        description: 'URL cloud complète pour le wizard web'
        required: false
        default: 'https://post.institutionlemignon.com'
  push:
    tags:
      - 'v*'

# Permissions nécessaires pour créer des GitHub Releases
permissions:
  contents: write

# ─── Variables globales ────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: '3.11'
  FLUTTER_VERSION: '3.44.2'

# ══════════════════════════════════════════════════════════════════════════════
#  BACKEND  —  Nuitka standalone
#  NB: les --include-package tiers ont été retirés.
#      Nuitka suit les imports automatiquement via --standalone.
#      Les packages chargés dynamiquement (pymysql, etc.) sont importés
#      explicitement dans server_main.py pour forcer leur inclusion.
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  # ── Windows ─────────────────────────────────────────────────────────────────
  backend-windows:
    name: 🖥 Backend — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install --upgrade pip
          # uvloop est Unix uniquement — on le filtre avant d'installer
          Get-Content requirements.txt |
            Where-Object { $_ -notmatch '^uvloop' -and $_.Trim() -ne '' } |
            Set-Content requirements_win.txt
          pip install -r requirements_win.txt
          pip install nuitka ordered-set

      - name: Verify packages
        shell: pwsh
        run: |
          python -c "import fastapi, sqlalchemy, uvicorn, pydantic; print('OK')"

      - name: Compile avec Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --include-package=api `
            --include-package-data=api `
            --include-package=alembic `
            --include-package-data=alembic `
            --include-data-files=alembic.ini=alembic.ini `
            --include-data-files=pos_server.ini.example=pos_server.ini.example `
            --include-data-dir=api/static=api/static `
            --output-dir=dist `
            --output-filename=posconnect-server `
            server_main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-windows
          path: dist/server_main.dist/

  # ── Linux ────────────────────────────────────────────────────────────────────
  backend-linux:
    name: 🐧 Backend — Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système
        run: sudo apt-get update && sudo apt-get install -y gcc patchelf ccache

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Compile avec Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --include-package=api \
            --include-package-data=api \
            --include-package=alembic \
            --include-package-data=alembic \
            --include-data-files=alembic.ini=alembic.ini \
            --include-data-files=pos_server.ini.example=pos_server.ini.example \
            --include-data-dir=api/static=api/static \
            --output-dir=dist \
            --output-filename=posconnect-server \
            server_main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux
          path: dist/server_main.dist/

  # ── macOS ────────────────────────────────────────────────────────────────────
  backend-macos:
    name:  Backend — macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set

      - name: Compile avec Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --include-package=api \
            --include-package-data=api \
            --include-package=alembic \
            --include-package-data=alembic \
            --include-data-files=alembic.ini=alembic.ini \
            --include-data-files=pos_server.ini.example=pos_server.ini.example \
            --include-data-dir=api/static=api/static \
            --output-dir=dist \
            --output-filename=posconnect-server \
            server_main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-macos
          path: dist/server_main.dist/

# ══════════════════════════════════════════════════════════════════════════════
#  FRONTEND  —  Flutter build
# ══════════════════════════════════════════════════════════════════════════════

  # ── Windows ─────────────────────────────────────────────────────────────────
  frontend-windows:
    name: 🖥 Frontend — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install packages
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows
        working-directory: frontend
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-windows
          path: frontend/build/windows/x64/runner/Release/

  # ── Linux ────────────────────────────────────────────────────────────────────
  frontend-linux:
    name: 🐧 Frontend — Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install packages
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux
        working-directory: frontend
        run: flutter build linux --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-linux
          path: frontend/build/linux/x64/release/bundle/

  # ── macOS ────────────────────────────────────────────────────────────────────
  frontend-macos:
    name:  Frontend — macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install packages
        working-directory: frontend
        run: flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: flutter build macos --release

      - name: Create archive
        run: |
          cd frontend/build/macos/Build/Products/Release
          ls -la   # debug: voir le vrai nom du .app
          APP=$(ls -d *.app 2>/dev/null | head -1)
          tar -czf posconnect-macos-app.tar.gz "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-macos
          path: frontend/build/macos/Build/Products/Release/posconnect-macos-app.tar.gz

  # ── Web ──────────────────────────────────────────────────────────────────────
  frontend-web:
    name: 🌐 Frontend — Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install packages
        working-directory: frontend
        run: flutter pub get

      - name: Résoudre les paramètres serveur web
        id: web_params
        run: |
          # Priorité : workflow_dispatch inputs → secrets → valeurs par défaut
          SCHEME="${{ github.event.inputs.web_server_scheme || secrets.WEB_SERVER_SCHEME || 'https' }}"
          IP="${{ github.event.inputs.web_server_ip || secrets.WEB_SERVER_IP || 'api.posconnect.ht' }}"
          PORT="${{ github.event.inputs.web_server_port || secrets.WEB_SERVER_PORT || '443' }}"
          CLOUD="${{ github.event.inputs.web_cloud_url || secrets.WEB_CLOUD_URL || 'https://posconnect.ht' }}"
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "ip=$IP"         >> $GITHUB_OUTPUT
          echo "port=$PORT"     >> $GITHUB_OUTPUT
          echo "cloud=$CLOUD"   >> $GITHUB_OUTPUT

      - name: Build Web
        working-directory: frontend
        run: |
          flutter build web --release \
            --dart-define=SERVER_SCHEME=${{ steps.web_params.outputs.scheme }} \
            --dart-define=SERVER_IP=${{ steps.web_params.outputs.ip }} \
            --dart-define=SERVER_PORT=${{ steps.web_params.outputs.port }} \
            --dart-define=CLOUD_URL=${{ steps.web_params.outputs.cloud }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-web
          path: frontend/build/web/

# ══════════════════════════════════════════════════════════════════════════════
#  INNO SETUP  —  Installeur Windows (.exe)
#
#  Dépendances téléchargées au moment du build :
#    - nginx 1.27.4   (nginx.org)
#    - nssm  2.24     (nssm.cc)
#  MySQL N'EST PAS bundlé — setup-windows.ps1 le télécharge à l'install
#  Certificats SSL :
#    - certificat/server.crt + server.key commités dans le repo (auto-signés)
# ══════════════════════════════════════════════════════════════════════════════

  inno-setup:
    name: 🏗 Windows Installer (Inno Setup)
    runs-on: windows-latest
    needs: [backend-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger backend-windows artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-windows
          path: certificat/backend-windows/

      - name: Télécharger et extraire nginx 1.27.4
        shell: pwsh
        run: |
          $ver = "1.27.4"
          Invoke-WebRequest -Uri "https://nginx.org/download/nginx-$ver.zip" -OutFile "nginx.zip" -UseBasicParsing
          Expand-Archive "nginx.zip" -DestinationPath "certificat" -Force
          if (Test-Path "certificat\nginx") { Remove-Item "certificat\nginx" -Recurse -Force }
          Rename-Item "certificat\nginx-$ver" "nginx"

      - name: Télécharger et extraire NSSM 2.24
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" -OutFile "nssm.zip" -UseBasicParsing
          Expand-Archive "nssm.zip" -DestinationPath "nssm-tmp" -Force
          New-Item -ItemType Directory -Force -Path "certificat\nssm" | Out-Null
          Copy-Item "nssm-tmp\nssm-2.24\win64\*" "certificat\nssm\" -Recurse -Force

      - name: Vérifier les certificats SSL
        shell: pwsh
        run: |
          # server.crt et server.key sont commités dans certificat/ (auto-signés, usage local)
          # ISCC les lira directement depuis certificat\ (chemin relatif au .iss)
          if (-not (Test-Path "certificat\server.crt") -or -not (Test-Path "certificat\server.key")) {
            throw "certificat\server.crt ou server.key introuvable — relancer 'certificat/generate.sh' et commiter les fichiers"
          }
          Write-Host "Certificats SSL présents ($(Get-Item 'certificat\server.crt' | Select-Object -ExpandProperty Length) octets)"

      - name: Déterminer la version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Compiler l'installeur Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver  = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Compilation Inno Setup v$ver"
          & $iscc "/DMyAppVersion=$ver" "certificat\pos-server.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup ISCC.exe a échoué (code $LASTEXITCODE)" }

      - name: Upload installeur Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: certificat/POSConnect-Setup-*.exe

# ══════════════════════════════════════════════════════════════════════════════
#  INNO CLIENT  —  Installeur Flutter Windows (.exe)
# ══════════════════════════════════════════════════════════════════════════════

  inno-client:
    name: 🖥 Client Installer (Inno Setup)
    runs-on: windows-latest
    needs: [frontend-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger frontend-windows artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-windows
          path: certificat/frontend-windows/

      - name: Déterminer la version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Compiler l'installeur client Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver  = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Compilation client Inno Setup v$ver"
          & $iscc "/DMyAppVersion=$ver" "certificat\pos-client.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup ISCC.exe a échoué (code $LASTEXITCODE)" }

      - name: Upload installeur client Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-installer
          path: certificat/POSConnect-Client-Setup-*.exe

# ══════════════════════════════════════════════════════════════════════════════
#  RELEASE  —  Assembler et publier
# ══════════════════════════════════════════════════════════════════════════════

  release:
    name: 📦 Créer la Release
    needs:
      - backend-windows
      - backend-linux
      - backend-macos
      - frontend-windows
      - frontend-linux
      - frontend-macos
      - frontend-web
      - inno-setup
      - inno-client
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger tous les artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Déterminer la version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Assembler Windows (zip backend+frontend)
        run: |
          mkdir -p packages/windows
          cp -r artifacts/backend-windows/* packages/windows/
          cp -r artifacts/frontend-windows/* packages/windows/
          cd packages
          zip -r posconnect-windows-${{ steps.version.outputs.VERSION }}.zip windows/

      - name: Copier installeur serveur Windows (.exe)
        run: |
          cp artifacts/windows-installer/POSConnect-Setup-*.exe packages/ 2>/dev/null || \
            echo "Avertissement : aucun EXE serveur Inno Setup trouvé"

      - name: Copier installeur client Windows (.exe)
        run: |
          cp artifacts/windows-client-installer/POSConnect-Client-Setup-*.exe packages/ 2>/dev/null || \
            echo "Avertissement : aucun EXE client Inno Setup trouvé"

      - name: Assembler Linux (tar.gz)
        run: |
          mkdir -p packages/linux
          cp -r artifacts/backend-linux/* packages/linux/
          cp -r artifacts/frontend-linux/* packages/linux/
          cd packages
          tar -czf posconnect-linux-${{ steps.version.outputs.VERSION }}.tar.gz linux/

      - name: Assembler macOS (tar.gz)
        run: |
          mkdir -p packages/macos
          cp -r artifacts/backend-macos/* packages/macos/
          cp artifacts/frontend-macos/posconnect-macos-app.tar.gz packages/macos/
          cd packages
          tar -czf posconnect-macos-${{ steps.version.outputs.VERSION }}.tar.gz macos/

      - name: Assembler Web (zip)
        run: |
          mkdir -p packages/web
          cp -r artifacts/frontend-web/* packages/web/
          cd packages
          zip -r posconnect-web-${{ steps.version.outputs.VERSION }}.zip web/

      - name: Afficher les tailles
        run: ls -lh packages/*.zip packages/*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: posconnect-v${{ steps.version.outputs.VERSION }}
          path: |
            packages/posconnect-windows-*.zip
            packages/POSConnect-Setup-*.exe
            packages/POSConnect-Client-Setup-*.exe
            packages/posconnect-linux-*.tar.gz
            packages/posconnect-macos-*.tar.gz
            packages/posconnect-web-*.zip
          retention-days: 30

      - name: Créer GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: POS Connect v${{ steps.version.outputs.VERSION }}
          body: |
            ## POS Connect v${{ steps.version.outputs.VERSION }}

            | Plateforme | Fichier |
            |-----------|---------|
            | Windows — Serveur (installeur) | `POSConnect-Setup-${{ steps.version.outputs.VERSION }}.exe` |
            | Windows — Client (installeur)  | `POSConnect-Client-Setup-${{ steps.version.outputs.VERSION }}.exe` |
            | Windows — Zip (serveur+client) | `posconnect-windows-${{ steps.version.outputs.VERSION }}.zip` |
            | Linux                | `posconnect-linux-${{ steps.version.outputs.VERSION }}.tar.gz` |
            | macOS                | `posconnect-macos-${{ steps.version.outputs.VERSION }}.tar.gz` |
            | Web                  | `posconnect-web-${{ steps.version.outputs.VERSION }}.zip` |

            ### Installation Windows
            Télécharger et exécuter `POSConnect-Setup-*.exe` en tant qu'Administrateur.
            Installe dans `C:\ProgramData\POS_Connect\` (données MySQL dans `C:\ProgramData\POS_Connect_MySQL\`).

            ### Déploiement Web
            Extraire `posconnect-web-*.zip` dans le dossier `web/` à côté du serveur FastAPI,
            ou servir avec Nginx (voir documentation).
          files: |
            packages/posconnect-windows-*.zip
            packages/POSConnect-Setup-*.exe
            packages/POSConnect-Client-Setup-*.exe
            packages/posconnect-linux-*.tar.gz
            packages/posconnect-macos-*.tar.gz
            packages/posconnect-web-*.zip
          draft: false
          prerelease: false
