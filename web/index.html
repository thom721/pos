    /* ── Loading overlay ────────────────────────────────── */
    #pos-loading {

      background: #FFFFFF;

      pointer-events: none;
    }
    .pos-logo-wrap {
      width: 200px; height: 100px;
      display: flex; align-items: center; justify-content: center;

    }

    .pos-tagline { color: #5A7A9A; font-size: 13px; margin-bottom: 36px; }
    .pos-spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(0,0,0,0.10);
      border-top-color: #0077C5;
      border-radius: 50%;
      animation: pos-spin 0.75s linear infinite;
    }
    @keyframes pos-spin { to { transform: rotate(360deg); } }
  </style>

  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <!-- Étend removeSplashFromWeb() pour retirer aussi #pos-loading quand Flutter est prêt.
       Ce script est placé après splash-screen-script pour pouvoir le patcher sans être
       écrasé par flutter_native_splash:create (qui ne touche que splash-screen-script). -->
  <script>
  (function () {
    function hidePosLoading() {
      var el = document.getElementById('pos-loading');
      if (!el) return;
      el.classList.add('out');
      setTimeout(function () { el && el.remove(); }, 400);
    }
    // Patch removeSplashFromWeb pour inclure #pos-loading
    var _orig = window.removeSplashFromWeb;
    window.removeSplashFromWeb = function () {
      if (_orig) _orig();
      hidePosLoading();
    };
    // Fallback : MutationObserver → retire #pos-loading dès que flt-glass-pane apparaît.
    // Démarré après DOMContentLoaded car document.body est null dans <head>.
    function startObserver() {
      var _obs = new MutationObserver(function () {
        if (document.querySelector('flt-glass-pane')) {
          hidePosLoading();
          _obs.disconnect();
        }
      });
      _obs.observe(document.body, { childList: true });
    }
    if (document.body) {
      startObserver();
    } else {
      document.addEventListener('DOMContentLoaded', startObserver);
    }
  })();
  </script>
